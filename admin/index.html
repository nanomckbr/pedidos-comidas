<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos Comidas — Admin</title>
    <style>
      :root {
        --bg: #000000;
        --panel: #09090b;
        --card: rgba(24, 24, 27, 0.95);
        --border: rgba(255, 255, 255, 0.1);
        --text: #ffffff;
        --muted: #a1a1aa;
        --accent: #f97316;
        --red: #ef4444;
        --green: #22c55e;
        --yellow: #eab308;
        --blue: #3b82f6;
        --orange: #fb923c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .hero {
        position: sticky;
        top: 0;
        z-index: 20;
        background: linear-gradient(135deg, #000000 0%, #09090b 55%, #431407 100%);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }

      .container {
        width: min(1600px, calc(100% - 32px));
        margin: 0 auto;
      }

      .hero-inner {
        padding: 32px 0 24px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-end;
        flex-wrap: wrap;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 48px);
      }

      .brand p {
        margin: 10px 0 0;
        color: #d4d4d8;
      }

      .top-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
      }

      .logo-tools {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 6px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.04);
      }

      .logo-thumb {
        width: 54px;
        height: 54px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #111;
        object-fit: contain;
        padding: 6px;
        display: none;
      }

      .logo-thumb.is-empty {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-align: center;
        line-height: 1.1;
      }

      button, .link-btn {
        border: 0;
        border-radius: 16px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-accent {
        background: var(--accent);
        color: #000;
      }

      .btn-dark {
        background: #18181b;
        color: #fff;
        border: 1px solid var(--border);
      }

      .btn-danger {
        background: var(--red);
        color: #fff;
      }

      .btn-green {
        background: var(--green);
        color: #04110a;
      }

      .btn-outline {
        background: transparent;
        color: #fff;
        border: 1px solid var(--border);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        padding: 22px 0;
      }

      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 18px;
      }

      .stat-card small {
        display: block;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .stat-card strong {
        font-size: 28px;
      }

      .content { padding: 8px 0 40px; }

      .kanban-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(280px, 1fr));
        gap: 16px;
        align-items: start;
        overflow-x: auto;
        padding-bottom: 12px;
      }

      .kanban-column {
        min-height: 240px;
        background: rgba(255, 255, 255, 0.025);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 14px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      }

      .column-header {
        position: sticky;
        top: 120px;
        z-index: 5;
        background: rgba(9, 9, 11, 0.92);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 14px;
        margin-bottom: 14px;
      }

      .column-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }

      .column-title {
        margin: 0;
        font-size: 18px;
      }

      .column-count {
        min-width: 34px;
        height: 34px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        background: rgba(255,255,255,0.08);
      }

      .column-subtitle {
        color: var(--muted);
        margin-top: 8px;
        font-size: 13px;
      }

      .column-nuevos .column-count { background: rgba(59,130,246,0.18); color: #bfdbfe; }
      .column-preparando .column-count { background: rgba(234,179,8,0.18); color: #fde68a; }
      .column-despacho .column-count { background: rgba(249,115,22,0.18); color: #fed7aa; }
      .column-finalizados .column-count { background: rgba(34,197,94,0.18); color: #bbf7d0; }
      .column-cancelados .column-count { background: rgba(239,68,68,0.18); color: #fecaca; }

      .column-body {
        display: grid;
        gap: 14px;
      }

      .order-card {
        background: rgba(24,24,27,0.92);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 14px 16px;
        box-shadow:
          0 20px 50px rgba(0,0,0,0.45),
          inset 0 1px 0 rgba(255,255,255,0.05);
        backdrop-filter: blur(6px);
        transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      }

      .order-card:hover{
        transform: translateY(-2px);
        box-shadow:
          0 25px 60px rgba(0,0,0,0.55),
          inset 0 1px 0 rgba(255,255,255,0.08);
      }

      .order-card.is-new-highlight {
        border-color: rgba(59,130,246,0.55);
        box-shadow:
          0 0 0 1px rgba(59,130,246,0.12),
          0 20px 50px rgba(0,0,0,0.45),
          inset 0 1px 0 rgba(255,255,255,0.05);
      }

      .order-top {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: flex-start;
      }

      .order-id {
        font-size: 24px;
        font-weight: 800;
        margin: 0;
      }

      .order-meta {
        margin-top: 10px;
        display: grid;
        gap: 6px;
        color: #e4e4e7;
        font-size: 14px;
      }

      .muted { color: var(--muted); }

      .status-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .status-nuevo {
        background: rgba(59, 130, 246, 0.18);
        color: #bfdbfe;
      }
      .status-preparando {
        background: rgba(234, 179, 8, 0.18);
        color: #fde68a;
      }
      .status-enviado {
        background: rgba(249, 115, 22, 0.18);
        color: #fed7aa;
      }
      .status-entregado {
        background: rgba(34, 197, 94, 0.18);
        color: #bbf7d0;
      }
      .status-cancelado {
        background: rgba(239, 68, 68, 0.18);
        color: #fecaca;
      }

      .items {
        margin-top: 18px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
      }

      .items h4,
      .dispatch-box h4,
      .action-box h4 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .items ul {
        margin: 0;
        padding-left: 18px;
      }

      .items li { margin-bottom: 8px; }

      .action-box,
      .dispatch-box,
      .summary-box {
        margin-top: 14px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
      }

      .action-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .field-row {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .field-row.two-cols {
        grid-template-columns: 1fr auto;
        align-items: end;
      }

      label.small-label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      input[type="number"] {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #18181b;
        color: #fff;
        padding: 12px;
        font-size: 14px;
      }

      .checkbox-line {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
        color: #f4f4f5;
      }

      .checkbox-line input {
        width: 18px;
        height: 18px;
        accent-color: var(--green);
      }

      .price-preview {
        display: grid;
        gap: 6px;
        margin-top: 10px;
        font-size: 14px;
      }

      .price-preview strong {
        font-size: 18px;
      }

      .badge-confirmed,
      .badge-soft {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 12px;
        font-weight: 700;
        margin-top: 10px;
      }

      .badge-confirmed {
        background: rgba(34,197,94,0.16);
        color: #bbf7d0;
      }

      .badge-soft {
        background: rgba(255,255,255,0.08);
        color: #e4e4e7;
      }

      .empty {
        padding: 24px;
        border: 1px dashed var(--border);
        border-radius: 20px;
        color: var(--muted);
        text-align: center;
      }

      .column-empty {
        padding: 18px 14px;
        border: 1px dashed rgba(255,255,255,0.08);
        border-radius: 18px;
        color: var(--muted);
        text-align: center;
        font-size: 14px;
      }

      .loading {
        color: var(--muted);
        padding: 18px 0;
      }

      .updated-at, .day-cut {
        color: var(--muted);
        font-size: 13px;
        margin-top: 6px;
      }

      .save-note {
        margin-top: 12px;
        font-size: 13px;
      }

      .save-note.ok { color: #86efac; }
      .save-note.error { color: #fca5a5; }


      .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        cursor: pointer;
      }

      .order-summary {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        min-width: 0;
      }

      .order-summary-item {
        font-size: 14px;
        color: #f4f4f5;
      }

      .order-summary-item.muted {
        color: var(--muted);
      }

      .order-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .order-toggle {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
        color: #fff;
        font-size: 14px;
        transition: transform .18s ease;
      }

      .order-body {
        display: none;
        margin-top: 16px;
      }

      .order-card.open .order-body {
        display: block;
      }

      .order-card.open .order-toggle {
        transform: rotate(180deg);
      }

      @media (max-width: 1400px) {
        .kanban-grid {
          grid-template-columns: repeat(5, minmax(300px, 1fr));
        }
      }

      @media (max-width: 700px) {
        .order-id { font-size: 22px; }
        .top-actions { justify-content: flex-start; }
        .container { width: min(100%, calc(100% - 20px)); }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <div class="container hero-inner">
        <div class="brand">
          <h1>Admin — Pedidos Comidas</h1>
          <p>Flujo operativo de pedidos en tiempo real</p>
        </div>

        <div class="top-actions">
          <div class="logo-tools">
            <button class="btn-dark" id="edit-logo-btn" type="button">Editar logo</button>
            <img id="logo-thumb" class="logo-thumb" alt="Logo actual" />
            <div id="logo-thumb-empty" class="logo-thumb is-empty">Sin logo</div>
            <input id="logo-image-input" type="file" accept="image/*" hidden />
          </div>
          <button class="btn-dark" id="refresh-btn">Actualizar</button>
          <a href="/menu" class="btn-dark link-btn">Panel menú</a>
          <button class="btn-dark" id="logout-btn">Salir</button>
          <button class="btn-accent" id="toggle-autorefresh">Auto refresh: ON</button>
          <button class="btn-danger" id="reset-day-btn">Reset día</button>
        </div>
      </div>
    </header>

    <main class="container content">
      <section class="stats">
        <div class="stat-card">
          <small>Total visibles</small>
          <strong id="stat-total">0</strong>
        </div>
        <div class="stat-card">
          <small>Nuevos</small>
          <strong id="stat-nuevo">0</strong>
        </div>
        <div class="stat-card">
          <small>Preparando</small>
          <strong id="stat-preparando">0</strong>
        </div>
        <div class="stat-card">
          <small>Despacho</small>
          <strong id="stat-despacho">0</strong>
        </div>
        <div class="stat-card">
          <small>Ventas del día</small>
          <strong id="stat-ventas">$0</strong>
        </div>
      </section>

      <div class="updated-at" id="updated-at">Sin actualizar todavía.</div>
      <div class="day-cut" id="day-cut-info">Corte del día: no definido.</div>
      <div id="save-logo-feedback" class="save-note"></div>

      <div id="orders-container" class="kanban-grid">
        <div class="loading">Cargando pedidos...</div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = 'https://ylvmzavgebttklblidcd.supabase.co';
      const supabaseKey = 'sb_publishable_rFS54R3Uw06tOJ0qxoFhBA_uoEHW457';
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

      const WORKFLOW_STORAGE_KEY = 'pedidoscomidas_order_workflow_v1';

      async function requireAuth() {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error || !data.session) {
          window.location.href = '/login';
          return false;
        }
        return true;
      }

      const ordersContainer = document.getElementById('orders-container');
      const refreshBtn = document.getElementById('refresh-btn');
      const logoutBtn = document.getElementById('logout-btn');
      const toggleAutorefreshBtn = document.getElementById('toggle-autorefresh');
      const resetDayBtn = document.getElementById('reset-day-btn');
      const updatedAtEl = document.getElementById('updated-at');
      const dayCutInfoEl = document.getElementById('day-cut-info');

      const statTotal = document.getElementById('stat-total');
      const statNuevo = document.getElementById('stat-nuevo');
      const statPreparando = document.getElementById('stat-preparando');
      const statDespacho = document.getElementById('stat-despacho');
      const statVentas = document.getElementById('stat-ventas');
      const editLogoBtn = document.getElementById('edit-logo-btn');
      const logoImageInput = document.getElementById('logo-image-input');
      const saveLogoFeedback = document.getElementById('save-logo-feedback');
      const logoThumb = document.getElementById('logo-thumb');
      const logoThumbEmpty = document.getElementById('logo-thumb-empty');

      let autoRefreshEnabled = true;
      let autoRefreshInterval = null;
      let knownOrderIds = new Set();
      let workflowMeta = loadWorkflowMeta();

      function loadWorkflowMeta() {
        try {
          return JSON.parse(localStorage.getItem(WORKFLOW_STORAGE_KEY) || '{}');
        } catch {
          return {};
        }
      }

      function saveWorkflowMeta() {
        localStorage.setItem(WORKFLOW_STORAGE_KEY, JSON.stringify(workflowMeta));
      }

      function getOrderMeta(orderId) {
        return workflowMeta[String(orderId)] || {
          deliveryFee: 0,
          finalPriceConfirmed: false,
          delivered: false,
          paid: false,
          finalTotal: null
        };
      }

      function setOrderMeta(orderId, patch) {
        const key = String(orderId);
        workflowMeta[key] = {
          ...getOrderMeta(orderId),
          ...patch
        };
        saveWorkflowMeta();
      }

      function getEnrichedOrder(order) {
        const meta = getOrderMeta(order.id);
        const deliveryFee = Number(meta.deliveryFee || 0);
        const baseTotal = Number(order.total || 0);
        const finalTotal = meta.finalPriceConfirmed
          ? Number(meta.finalTotal || baseTotal + deliveryFee)
          : baseTotal + deliveryFee;

        return {
          ...order,
          workflow: {
            ...meta,
            deliveryFee,
            baseTotal,
            finalTotal
          }
        };
      }

      function formatPrice(value) {
        return new Intl.NumberFormat('es-AR', {
          style: 'currency',
          currency: 'ARS',
          maximumFractionDigits: 0
        }).format(Number(value || 0));
      }

      function setLogoThumb(src) {
        if (src) {
          logoThumb.src = src;
          logoThumb.style.display = 'block';
          logoThumbEmpty.style.display = 'none';
        } else {
          logoThumb.removeAttribute('src');
          logoThumb.style.display = 'none';
          logoThumbEmpty.style.display = 'inline-flex';
        }
      }

      async function ensureStoreSettingsRow() {
        const { data, error } = await supabaseClient
          .from('store_settings')
          .select('*')
          .eq('store_id', 1)
          .maybeSingle();

        if (error) {
          console.error('No se pudo leer store_settings:', error);
          return null;
        }

        if (data) return data;

        const { data: created, error: createError } = await supabaseClient
          .from('store_settings')
          .insert([{ store_id: 1 }])
          .select()
          .single();

        if (createError) {
          console.error('No se pudo crear store_settings:', createError);
          return null;
        }

        return created;
      }

      function resizeImageToDataUrl(file, maxSize = 420, quality = 0.82) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let { width, height } = img;

              if (width > height && width > maxSize) {
                height = Math.round((height * maxSize) / width);
                width = maxSize;
              } else if (height >= width && height > maxSize) {
                width = Math.round((width * maxSize) / height);
                height = maxSize;
              }

              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = reject;
            img.src = reader.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function loadBrandingSettings() {
        const settings = await ensureStoreSettingsRow();
        if (!settings) return;
        setLogoThumb(settings.logo_image || '');
      }

      async function saveBrandingSettings(file) {
        if (!file) {
          saveLogoFeedback.className = 'save-note error';
          saveLogoFeedback.textContent = 'Selecciona una imagen primero.';
          return;
        }

        saveLogoFeedback.className = 'save-note';
        saveLogoFeedback.textContent = 'Procesando y guardando logo...';

        try {
          const compressedImage = await resizeImageToDataUrl(file);

          const { error } = await supabaseClient
            .from('store_settings')
            .update({ logo_image: compressedImage })
            .eq('store_id', 1);

          if (error) {
            console.error(error);
            saveLogoFeedback.className = 'save-note error';
            saveLogoFeedback.textContent = 'No se pudo guardar el logo.';
            return;
          }

          setLogoThumb(compressedImage);
          saveLogoFeedback.className = 'save-note ok';
          saveLogoFeedback.textContent = 'Logo guardado correctamente.';
        } catch (err) {
          console.error(err);
          saveLogoFeedback.className = 'save-note error';
          saveLogoFeedback.textContent = 'No se pudo procesar la imagen.';
        }
      }

      function formatDate(value) {
        const date = new Date(value);
        return date.toLocaleString('es-AR', {
          dateStyle: 'short',
          timeStyle: 'short'
        });
      }

      function statusClass(status) {
        return `status-${status}`;
      }

      function getDayCut() {
        const saved = localStorage.getItem('pedidoscomidas_day_cut');
        if (saved) return new Date(saved);

        const now = new Date();
        now.setHours(0, 0, 0, 0);
        localStorage.setItem('pedidoscomidas_day_cut', now.toISOString());
        return now;
      }

      function getDayReset() {
        const saved = localStorage.getItem('pedidoscomidas_day_reset');
        if (saved) return new Date(saved);

        const now = new Date();
        now.setHours(0, 0, 0, 0);
        localStorage.setItem('pedidoscomidas_day_reset', now.toISOString());
        return now;
      }

      function setDayCutNow() {
        const now = new Date();
        localStorage.setItem('pedidoscomidas_day_cut', now.toISOString());
        localStorage.setItem('pedidoscomidas_day_reset', now.toISOString());
        updateDayCutInfo();
      }

      function updateDayCutInfo() {
        const cut = getDayCut();
        const reset = getDayReset();
        dayCutInfoEl.textContent = `Corte del día: ${cut.toLocaleString('es-AR')} · Reset visible desde: ${reset.toLocaleString('es-AR')}`;
      }

      function playNewOrderSound() {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();

          const notes = [
            { freq: 880, start: 0.00, duration: 0.18, gain: 0.16 },
            { freq: 988, start: 0.20, duration: 0.18, gain: 0.16 },
            { freq: 1174, start: 0.40, duration: 0.26, gain: 0.18 }
          ];

          notes.forEach(note => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(note.freq, audioContext.currentTime + note.start);

            gainNode.gain.setValueAtTime(0.001, audioContext.currentTime + note.start);
            gainNode.gain.exponentialRampToValueAtTime(note.gain, audioContext.currentTime + note.start + 0.03);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + note.start + note.duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start(audioContext.currentTime + note.start);
            oscillator.stop(audioContext.currentTime + note.start + note.duration);
          });
        } catch (error) {
          console.log('No se pudo reproducir sonido:', error);
        }
      }

      function detectNewOrders(orders) {
        const currentIds = new Set(orders.map(order => order.id));
        if (knownOrderIds.size > 0) {
          const hasNew = [...currentIds].some(id => !knownOrderIds.has(id));
          if (hasNew) playNewOrderSound();
        }
        knownOrderIds = currentIds;
      }

      function sortOrders(orders) {
        return [...orders].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      }

      function buildStats(orders) {
        const cut = getDayCut();
        const ventasDelDia = orders
          .filter(order => order.status === 'entregado' && new Date(order.created_at) >= cut)
          .reduce((sum, order) => sum + Number(order.workflow?.finalTotal || order.total || 0), 0);

        statTotal.textContent = orders.length;
        statNuevo.textContent = orders.filter(o => o.status === 'nuevo').length;
        statPreparando.textContent = orders.filter(o => o.status === 'preparando').length;
        statDespacho.textContent = orders.filter(o => o.status === 'enviado').length;
        statVentas.textContent = formatPrice(ventasDelDia);
      }

      async function updateStatus(orderId, newStatus) {
        const { error } = await supabaseClient
          .from('orders')
          .update({ status: newStatus })
          .eq('id', orderId);

        if (error) {
          console.error(error);
          alert('No se pudo actualizar el estado.');
          return false;
        }

        return true;
      }

      async function handleConfirmOrder(orderId) {
        const ok = await updateStatus(orderId, 'preparando');
        if (!ok) return;
        await loadOrders();
      }

      async function handleCancelOrder(orderId) {
        const ok = await updateStatus(orderId, 'cancelado');
        if (!ok) return;
        await loadOrders();
      }

      async function handleReadyOrder(orderId) {
        const ok = await updateStatus(orderId, 'enviado');
        if (!ok) return;
        await loadOrders();
      }

      function syncDispatchInputs() {
        document.querySelectorAll('[data-delivery-fee-input]').forEach(input => {
          input.addEventListener('input', (event) => {
            const orderId = event.target.dataset.orderId;
            const value = Number(event.target.value || 0);
            setOrderMeta(orderId, {
              deliveryFee: Math.max(0, value),
              finalPriceConfirmed: false,
              finalTotal: null
            });

            const orderCard = event.target.closest('.order-card');
            const baseTotal = Number(orderCard?.dataset.baseTotal || 0);
            const preview = orderCard?.querySelector('[data-final-price-preview]');
            if (preview) preview.textContent = formatPrice(baseTotal + Math.max(0, value));

            const confirmedBadge = orderCard?.querySelector('[data-final-price-badge]');
            if (confirmedBadge) {
              confirmedBadge.textContent = 'Precio final pendiente';
              confirmedBadge.className = 'badge-soft';
            }
          });
        });

        document.querySelectorAll('[data-confirm-final-price]').forEach(button => {
          button.addEventListener('click', async (event) => {
            const orderId = Number(event.target.dataset.orderId);
            const orderCard = event.target.closest('.order-card');
            const feeInput = orderCard.querySelector('[data-delivery-fee-input]');
            const baseTotal = Number(orderCard.dataset.baseTotal || 0);
            const deliveryFee = Math.max(0, Number(feeInput?.value || 0));
            const finalTotal = baseTotal + deliveryFee;

            setOrderMeta(orderId, {
              deliveryFee,
              finalPriceConfirmed: true,
              finalTotal
            });

            await loadOrders();
          });
        });

        document.querySelectorAll('[data-paid-checkbox]').forEach(checkbox => {
          checkbox.addEventListener('change', async (event) => {
            const orderId = Number(event.target.dataset.orderId);
            setOrderMeta(orderId, { paid: event.target.checked });
            await maybeFinalizeOrder(orderId);
            await loadOrders();
          });
        });

        document.querySelectorAll('[data-delivered-btn]').forEach(button => {
          button.addEventListener('click', async (event) => {
            const orderId = Number(event.target.dataset.orderId);
            setOrderMeta(orderId, { delivered: true });
            await maybeFinalizeOrder(orderId);
            await loadOrders();
          });
        });
      }

      async function maybeFinalizeOrder(orderId) {
        const meta = getOrderMeta(orderId);
        if (meta.finalPriceConfirmed && meta.paid && meta.delivered) {
          await updateStatus(orderId, 'entregado');
        }
      }

      function renderNewActions(order) {
        return `
          <div class="action-box">
            <h4>Acciones</h4>
            <div class="action-row">
              <button class="btn-green" data-confirm-order="${order.id}">Confirmar</button>
              <button class="btn-danger" data-cancel-order="${order.id}">Rechazar</button>
            </div>
          </div>
        `;
      }

      function renderPreparingActions(order) {
        return `
          <div class="action-box">
            <h4>Cocina</h4>
            <div class="action-row">
              <button class="btn-accent" data-ready-order="${order.id}">Pedido listo</button>
              <button class="btn-outline" data-cancel-order="${order.id}">Cancelar</button>
            </div>
          </div>
        `;
      }

      function renderDispatchActions(order) {
        const workflow = order.workflow || {};
        const badgeClass = workflow.finalPriceConfirmed ? 'badge-confirmed' : 'badge-soft';
        const badgeText = workflow.finalPriceConfirmed ? 'Precio final confirmado' : 'Precio final pendiente';
        const finalPreview = workflow.finalPriceConfirmed ? workflow.finalTotal : workflow.baseTotal + workflow.deliveryFee;

        return `
          <div class="dispatch-box">
            <h4>Entrega / cobro</h4>

            <div class="field-row two-cols">
              <div>
                <label class="small-label" for="delivery-fee-${order.id}">Costo de envío</label>
                <input
                  id="delivery-fee-${order.id}"
                  type="number"
                  min="0"
                  step="1"
                  value="${workflow.deliveryFee || 0}"
                  data-order-id="${order.id}"
                  data-delivery-fee-input
                />
              </div>
              <button class="btn-accent" data-order-id="${order.id}" data-confirm-final-price>
                Confirmar precio
              </button>
            </div>

            <div class="price-preview">
              <div>Total productos: ${formatPrice(workflow.baseTotal)}</div>
              <div>Envío: ${formatPrice(workflow.deliveryFee)}</div>
              <strong>Total final: <span data-final-price-preview>${formatPrice(finalPreview)}</span></strong>
            </div>

            <div class="${badgeClass}" data-final-price-badge>${badgeText}</div>

            <label class="checkbox-line">
              <input type="checkbox" data-order-id="${order.id}" data-paid-checkbox ${workflow.paid ? 'checked' : ''} />
              <span>Pagado</span>
            </label>

            <div class="action-row" style="margin-top: 12px;">
              <button
                class="btn-green"
                data-order-id="${order.id}"
                data-delivered-btn
                ${workflow.delivered ? 'disabled' : ''}
              >
                ${workflow.delivered ? 'Entregado ✓' : 'Entregado'}
              </button>
            </div>

            <div class="summary-box">
              <div class="muted">Pasa a <strong>Finalizados</strong> cuando estén completos estos 3 pasos:</div>
              <div class="price-preview" style="margin-top: 10px;">
                <div>${workflow.finalPriceConfirmed ? '✅' : '⬜'} Precio final confirmado</div>
                <div>${workflow.delivered ? '✅' : '⬜'} Pedido entregado</div>
                <div>${workflow.paid ? '✅' : '⬜'} Pedido pagado</div>
              </div>
            </div>
          </div>
        `;
      }

      function renderFinalizedSummary(order) {
        const workflow = order.workflow || {};
        return `
          <div class="summary-box">
            <div class="price-preview">
              <div>Total productos: ${formatPrice(workflow.baseTotal)}</div>
              <div>Envío: ${formatPrice(workflow.deliveryFee)}</div>
              <strong>Total final: ${formatPrice(workflow.finalTotal)}</strong>
            </div>
            <div class="badge-confirmed">Pedido cobrado y entregado</div>
          </div>
        `;
      }

      function renderCancelledSummary() {
        return `
          <div class="summary-box">
            <div class="muted">Este pedido fue rechazado o cancelado y ya no participa del flujo ni de las ventas del día.</div>
          </div>
        `;
      }

      function renderOrderCard(order, items) {
        const orderItems = items.filter(item => item.order_id === order.id);
        const orderItemsCount = orderItems.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
        const itemsHtml = orderItems.length
          ? `
            <div class="items">
              <h4>Productos</h4>
              <ul>
                ${orderItems.map(item => `
                  <li>${item.quantity} x ${item.product_name} — ${formatPrice(item.subtotal)}</li>
                `).join('')}
              </ul>
            </div>
          `
          : `
            <div class="items">
              <h4>Productos</h4>
              <div class="muted">Sin detalle de productos.</div>
            </div>
          `;

        let extraHtml = '';
        if (order.status === 'nuevo') extraHtml = renderNewActions(order);
        if (order.status === 'preparando') extraHtml = renderPreparingActions(order);
        if (order.status === 'enviado') extraHtml = renderDispatchActions(order);
        if (order.status === 'entregado') extraHtml = renderFinalizedSummary(order);
        if (order.status === 'cancelado') extraHtml = renderCancelledSummary();

        return `
          <article class="order-card ${order.status === 'nuevo' ? 'is-new-highlight' : ''}" data-base-total="${Number(order.total || 0)}">
            <div class="order-header">
              <div class="order-summary">
                <span class="order-summary-item"><strong>Pedido #${order.id}</strong></span>
                <span class="order-summary-item muted">${order.customer_name || 'Cliente sin nombre'}</span>
                <span class="order-summary-item muted">${new Date(order.created_at).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })}</span>
                <span class="order-summary-item muted">${orderItemsCount} ítem${orderItemsCount === 1 ? '' : 's'}</span>
                <span class="order-summary-item"><strong>${formatPrice(order.workflow?.finalTotal || order.total)}</strong></span>
              </div>

              <div class="order-right">
                <span class="status-pill ${statusClass(order.status)}">${order.status.toUpperCase()}</span>
                <span class="order-toggle">▼</span>
              </div>
            </div>

            <div class="order-body">
              <div class="order-meta">
                <div><strong>Cliente:</strong> ${order.customer_name || '-'}</div>
                <div><strong>Tipo:</strong> ${order.order_type || '-'}</div>
                ${order.address ? `<div><strong>Dirección:</strong> ${order.address}</div>` : ''}
                <div><strong>Pago:</strong> ${order.payment_method || '-'}</div>
                <div><strong>Total base:</strong> ${formatPrice(order.total)}</div>
                <div><strong>Fecha:</strong> ${formatDate(order.created_at)}</div>
                <div><strong>Observaciones:</strong> ${order.notes || '-'}</div>
              </div>

              ${itemsHtml}
              ${extraHtml}
            </div>
          </article>
        `;
      }

      function renderColumn(columnClass, title, subtitle, orders, items) {
        return `
          <section class="kanban-column ${columnClass}">
            <div class="column-header">
              <div class="column-top">
                <h2 class="column-title">${title}</h2>
                <span class="column-count">${orders.length}</span>
              </div>
              <div class="column-subtitle">${subtitle}</div>
            </div>
            <div class="column-body">
              ${orders.length
                ? orders.map(order => renderOrderCard(order, items)).join('')
                : '<div class="column-empty">No hay pedidos en esta columna.</div>'}
            </div>
          </section>
        `;
      }

      function enableOrderAccordion() {
        document.querySelectorAll('.order-header').forEach(header => {
          header.addEventListener('click', () => {
            const card = header.closest('.order-card');
            const isOpen = card.classList.contains('open');

            document.querySelectorAll('.order-card.open').forEach(openCard => {
              openCard.classList.remove('open');
            });

            if (!isOpen) {
              card.classList.add('open');
            }
          });
        });
      }

      function attachActionEvents() {
        document.querySelectorAll('[data-confirm-order]').forEach(button => {
          button.addEventListener('click', async (event) => {
            const orderId = Number(event.target.dataset.confirmOrder);
            await handleConfirmOrder(orderId);
          });
        });

        document.querySelectorAll('[data-cancel-order]').forEach(button => {
          button.addEventListener('click', async (event) => {
            const orderId = Number(event.target.dataset.cancelOrder);
            await handleCancelOrder(orderId);
          });
        });

        document.querySelectorAll('[data-ready-order]').forEach(button => {
          button.addEventListener('click', async (event) => {
            const orderId = Number(event.target.dataset.readyOrder);
            await handleReadyOrder(orderId);
          });
        });

        syncDispatchInputs();
      }

      function renderOrders(orders, items) {
        const enrichedOrders = sortOrders(orders).map(getEnrichedOrder);
        buildStats(enrichedOrders);

        if (!enrichedOrders.length) {
          ordersContainer.innerHTML = '<div class="empty">Todavía no hay pedidos guardados.</div>';
          return;
        }

        const nuevos = enrichedOrders.filter(order => order.status === 'nuevo');
        const preparando = enrichedOrders.filter(order => order.status === 'preparando');
        const despacho = enrichedOrders.filter(order => order.status === 'enviado');
        const finalizados = enrichedOrders.filter(order => order.status === 'entregado');
        const cancelados = enrichedOrders.filter(order => order.status === 'cancelado');

        ordersContainer.innerHTML = [
          renderColumn('column-nuevos', 'Pedidos nuevos', 'Confirmar o rechazar', nuevos, items),
          renderColumn('column-preparando', 'Preparando', 'Pedidos aceptados en cocina', preparando, items),
          renderColumn('column-despacho', 'Despacho', 'Entrega, envío y cobro', despacho, items),
          renderColumn('column-finalizados', 'Finalizados', 'Solo pedidos entregados y pagados', finalizados, items),
          renderColumn('column-cancelados', 'Cancelados', 'Pedidos rechazados o anulados', cancelados, items)
        ].join('');

        attachActionEvents();
        enableOrderAccordion();
      }

      async function loadOrders() {
        ordersContainer.innerHTML = '<div class="loading">Cargando pedidos...</div>';

        const { data: ordersData, error: ordersError } = await supabaseClient
          .from('orders')
          .select('*')
          .order('created_at', { ascending: false });

        const { data: itemsData, error: itemsError } = await supabaseClient
          .from('order_items')
          .select('*')
          .order('id', { ascending: true });

        if (ordersError || itemsError) {
          console.error(ordersError || itemsError);
          ordersContainer.innerHTML = '<div class="empty">No se pudieron cargar los pedidos.</div>';
          return;
        }

        const resetPoint = getDayReset();
        const allOrders = ordersData || [];
        const visibleOrders = allOrders.filter(order => new Date(order.created_at) >= resetPoint);
        const visibleOrderIds = new Set(visibleOrders.map(order => order.id));
        const visibleItems = (itemsData || []).filter(item => visibleOrderIds.has(item.order_id));

        detectNewOrders(visibleOrders);
        renderOrders(visibleOrders, visibleItems);

        updatedAtEl.textContent = `Última actualización: ${new Date().toLocaleTimeString('es-AR')}`;
        updateDayCutInfo();
      }

      function startAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(loadOrders, 10000);
      }

      function stopAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
      }

      refreshBtn.addEventListener('click', async () => {
        await loadOrders();
      });

      editLogoBtn.addEventListener('click', () => {
        logoImageInput.click();
      });

      logoImageInput.addEventListener('change', async () => {
        const file = logoImageInput.files?.[0];
        if (!file) return;

        try {
          const previewData = await resizeImageToDataUrl(file, 220, 0.8);
          setLogoThumb(previewData);
          await saveBrandingSettings(file);
        } catch (err) {
          console.error(err);
          saveLogoFeedback.className = 'save-note error';
          saveLogoFeedback.textContent = 'No se pudo procesar la imagen.';
        } finally {
          logoImageInput.value = '';
        }
      });

      logoutBtn.addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
        window.location.href = '/login';
      });

      toggleAutorefreshBtn.addEventListener('click', () => {
        autoRefreshEnabled = !autoRefreshEnabled;
        if (autoRefreshEnabled) {
          startAutoRefresh();
          toggleAutorefreshBtn.textContent = 'Auto refresh: ON';
        } else {
          stopAutoRefresh();
          toggleAutorefreshBtn.textContent = 'Auto refresh: OFF';
        }
      });

      resetDayBtn.addEventListener('click', async () => {
        const ok = confirm('¿Seguro que quieres reiniciar el día? Se ocultarán de la vista todos los pedidos recibidos hasta este momento.');
        if (!ok) return;
        setDayCutNow();
        await loadOrders();
      });

      (async () => {
        const allowed = await requireAuth();
        if (!allowed) return;
        await loadBrandingSettings();
        await loadOrders();
        startAutoRefresh();
      })();
    </script>
  </body>
</html>
