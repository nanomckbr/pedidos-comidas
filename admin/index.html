<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos Comidas — Admin</title>
    <style>
      :root {
        --bg: #000000;
        --panel: #09090b;
        --card: rgba(24, 24, 27, 0.95);
        --border: rgba(255, 255, 255, 0.1);
        --text: #ffffff;
        --muted: #a1a1aa;
        --accent: #f97316;
        --green: #22c55e;
        --yellow: #eab308;
        --blue: #3b82f6;
        --red: #ef4444;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .hero {
        background: linear-gradient(135deg, #000000 0%, #09090b 55%, #431407 100%);
        border-bottom: 1px solid var(--border);
      }

      .container {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
      }

      .hero-inner {
        padding: 32px 0 24px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-end;
        flex-wrap: wrap;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 48px);
      }

      .brand p {
        margin: 10px 0 0;
        color: #d4d4d8;
      }

      .top-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-accent {
        background: var(--accent);
        color: #000;
      }

      .btn-dark {
        background: #18181b;
        color: #fff;
        border: 1px solid var(--border);
      }

      .btn-danger {
        background: var(--red);
        color: #fff;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        padding: 22px 0;
      }

      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 18px;
      }

      .stat-card small {
        display: block;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .stat-card strong {
        font-size: 28px;
      }

      .content {
        padding: 8px 0 40px;
      }

      .orders-grid {
        display: grid;
        gap: 16px;
      }

      .order-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 18px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.24);
      }

      .order-top {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .order-id {
        font-size: 28px;
        font-weight: 800;
        margin: 0;
      }

      .order-meta {
        margin-top: 10px;
        display: grid;
        gap: 6px;
        color: #e4e4e7;
      }

      .muted {
        color: var(--muted);
      }

      .items {
        margin-top: 18px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
      }

      .items h4 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .items ul {
        margin: 0;
        padding-left: 18px;
      }

      .items li {
        margin-bottom: 8px;
      }

      .order-footer {
        margin-top: 18px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 700;
      }

      .status-nuevo {
        background: rgba(59, 130, 246, 0.18);
        color: #bfdbfe;
      }

      .status-preparando {
        background: rgba(234, 179, 8, 0.18);
        color: #fde68a;
      }

      .status-enviado {
        background: rgba(249, 115, 22, 0.18);
        color: #fed7aa;
      }

      .status-entregado {
        background: rgba(34, 197, 94, 0.18);
        color: #bbf7d0;
      }

      .status-cancelado {
        background: rgba(239, 68, 68, 0.18);
        color: #fecaca;
      }

      select {
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #18181b;
        color: #fff;
        padding: 10px 12px;
        font-size: 14px;
      }

      .empty {
        padding: 24px;
        border: 1px dashed var(--border);
        border-radius: 20px;
        color: var(--muted);
        text-align: center;
      }

      .loading {
        color: var(--muted);
        padding: 18px 0;
      }

      .updated-at {
        color: var(--muted);
        font-size: 13px;
        margin-top: 6px;
      }

      .day-cut {
        color: var(--muted);
        font-size: 13px;
        margin-top: 10px;
      }

      @media (max-width: 700px) {
        .order-id {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <div class="container hero-inner">
        <div class="brand">
          <h1>Admin — Pedidos Comidas</h1>
          <p>Panel de pedidos en tiempo real</p>
        </div>

        <div class="top-actions">
          <button class="btn-dark" id="refresh-btn">Actualizar</button>
          <button class="btn-dark" id="logout-btn">Salir</button>
          <button class="btn-accent" id="toggle-autorefresh">Auto refresh: ON</button>
          <button class="btn-danger" id="reset-day-btn">Reset día</button>
        </div>
      </div>
    </header>

    <main class="container content">
      <section class="stats">
        <div class="stat-card">
          <small>Total pedidos</small>
          <strong id="stat-total">0</strong>
        </div>
        <div class="stat-card">
          <small>Nuevos</small>
          <strong id="stat-nuevo">0</strong>
        </div>
        <div class="stat-card">
          <small>Preparando</small>
          <strong id="stat-preparando">0</strong>
        </div>
        <div class="stat-card">
          <small>Ventas del día</small>
          <strong id="stat-ventas">$0</strong>
        </div>
      </section>

      <div class="updated-at" id="updated-at">Sin actualizar todavía.</div>
      <div class="day-cut" id="day-cut-info">Corte del día: no definido.</div>

      <div id="orders-container" class="orders-grid">
        <div class="loading">Cargando pedidos...</div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = 'https://ylvmzavgebttklblidcd.supabase.co';
      const supabaseKey = 'sb_publishable_rFS54R3Uw06tOJ0qxoFhBA_uoEHW457';
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

      async function requireAuth() {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error || !data.session) {
          window.location.href = '/login.html';
          return false;
        }
        return true;
      }

      const ordersContainer = document.getElementById('orders-container');
      const refreshBtn = document.getElementById('refresh-btn');
      const logoutBtn = document.getElementById('logout-btn');
      const toggleAutorefreshBtn = document.getElementById('toggle-autorefresh');
      const resetDayBtn = document.getElementById('reset-day-btn');
      const updatedAtEl = document.getElementById('updated-at');
      const dayCutInfoEl = document.getElementById('day-cut-info');

      const statTotal = document.getElementById('stat-total');
      const statNuevo = document.getElementById('stat-nuevo');
      const statPreparando = document.getElementById('stat-preparando');
      const statVentas = document.getElementById('stat-ventas');

      let autoRefreshEnabled = true;
      let autoRefreshInterval = null;
      let knownOrderIds = new Set();

      function formatPrice(value) {
        return new Intl.NumberFormat('es-AR', {
          style: 'currency',
          currency: 'ARS',
          maximumFractionDigits: 0
        }).format(value);
      }

      function formatDate(value) {
        const date = new Date(value);
        return date.toLocaleString('es-AR', {
          dateStyle: 'short',
          timeStyle: 'short'
        });
      }

      function statusClass(status) {
        return `status-${status}`;
      }

      async function ensureStoreSettings() {
        const { data, error } = await supabaseClient
          .from('store_settings')
          .select('*')
          .eq('store_id', 1)
          .limit(1);

        if (error) {
          console.error('Error leyendo store_settings:', error);
          return null;
        }

        if (data && data.length > 0) return data[0];

        const now = new Date().toISOString();
        const { data: inserted, error: insertError } = await supabaseClient
          .from('store_settings')
          .insert([{ store_id: 1, day_cutoff: now }])
          .select()
          .single();

        if (insertError) {
          console.error('Error creando store_settings:', insertError);
          return null;
        }

        return inserted;
      }

      async function getDayCut() {
        const settings = await ensureStoreSettings();
        if (!settings || !settings.day_cutoff) return new Date();
        return new Date(settings.day_cutoff);
      }

      async function setDayCutNow() {
        const now = new Date().toISOString();

        const { error } = await supabaseClient
          .from('store_settings')
          .update({ day_cutoff: now, updated_at: now })
          .eq('store_id', 1);

        if (error) {
          console.error('Error actualizando day_cutoff:', error);
          alert('No se pudo reiniciar el día.');
          return false;
        }

        await updateDayCutInfo();
        knownOrderIds = new Set();
        return true;
      }

      async function updateDayCutInfo() {
        const cut = await getDayCut();
        dayCutInfoEl.textContent = `Corte del día: ${cut.toLocaleString('es-AR')}`;
      }

      function playNewOrderSound() {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();

          const notes = [
            { freq: 740, start: 0.00, duration: 0.22, gain: 0.14 },
            { freq: 880, start: 0.24, duration: 0.24, gain: 0.15 },
            { freq: 1047, start: 0.52, duration: 0.34, gain: 0.18 }
          ];

          notes.forEach(note => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(note.freq, audioContext.currentTime + note.start);

            gainNode.gain.setValueAtTime(0.001, audioContext.currentTime + note.start);
            gainNode.gain.exponentialRampToValueAtTime(note.gain, audioContext.currentTime + note.start + 0.04);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + note.start + note.duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start(audioContext.currentTime + note.start);
            oscillator.stop(audioContext.currentTime + note.start + note.duration);
          });
        } catch (error) {
          console.log('No se pudo reproducir sonido:', error);
        }
      }

      function detectNewOrders(orders) {
        const currentIds = new Set(orders.map(order => order.id));
        if (knownOrderIds.size > 0) {
          const hasNew = [...currentIds].some(id => !knownOrderIds.has(id));
          if (hasNew) playNewOrderSound();
        }
        knownOrderIds = currentIds;
      }

      function sortOrders(orders) {
        const priority = { nuevo: 1, preparando: 2, enviado: 3, entregado: 4, cancelado: 5 };
        return [...orders].sort((a, b) => {
          const pA = priority[a.status] || 99;
          const pB = priority[b.status] || 99;
          if (pA !== pB) return pA - pB;
          return new Date(b.created_at) - new Date(a.created_at);
        });
      }

      async function buildStats(orders) {
        const cut = await getDayCut();
        const ventasDelDia = orders
          .filter(order => order.status === 'entregado' && new Date(order.created_at) >= cut)
          .reduce((sum, order) => sum + (order.total || 0), 0);

        statTotal.textContent = orders.length;
        statNuevo.textContent = orders.filter(o => o.status === 'nuevo').length;
        statPreparando.textContent = orders.filter(o => o.status === 'preparando').length;
        statVentas.textContent = formatPrice(ventasDelDia);
      }

      async function updateStatus(orderId, newStatus) {
        const { error } = await supabaseClient
          .from('orders')
          .update({ status: newStatus })
          .eq('id', orderId);

        if (error) {
          console.error(error);
          alert('No se pudo actualizar el estado.');
          return;
        }

        await loadOrders();
      }

      function renderOrders(orders, items) {
        const sortedOrders = sortOrders(orders);
        if (!sortedOrders.length) {
          ordersContainer.innerHTML = '<div class="empty">Todavía no hay pedidos guardados.</div>';
          return;
        }

        ordersContainer.innerHTML = sortedOrders.map(order => {
          const orderItems = items.filter(item => item.order_id === order.id);
          const itemsHtml = orderItems.length
            ? `
              <div class="items">
                <h4>Productos</h4>
                <ul>
                  ${orderItems.map(item => `
                    <li>
                      ${item.quantity} x ${item.product_name} — ${formatPrice(item.subtotal)}
                    </li>
                  `).join('')}
                </ul>
              </div>
            `
            : `
              <div class="items">
                <h4>Productos</h4>
                <div class="muted">Sin detalle de productos.</div>
              </div>
            `;

          return `
            <article class="order-card">
              <div class="order-top">
                <div>
                  <h3 class="order-id">Pedido #${order.id}</h3>
                  <div class="order-meta">
                    <div><strong>Cliente:</strong> ${order.customer_name}</div>
                    <div><strong>Tipo:</strong> ${order.order_type}</div>
                    ${order.address ? `<div><strong>Dirección:</strong> ${order.address}</div>` : ''}
                    <div><strong>Pago:</strong> ${order.payment_method}</div>
                    <div><strong>Total:</strong> ${formatPrice(order.total)}</div>
                    <div><strong>Fecha:</strong> ${formatDate(order.created_at)}</div>
                    <div><strong>Observaciones:</strong> ${order.notes || '-'}</div>
                  </div>
                </div>

                <div>
                  <span class="status-pill ${statusClass(order.status)}">${order.status.toUpperCase()}</span>
                </div>
              </div>

              ${itemsHtml}

              <div class="order-footer">
                <div>
                  <label class="muted" for="status-${order.id}">Cambiar estado</label><br />
                  <select id="status-${order.id}" data-order-id="${order.id}">
                    <option value="nuevo" ${order.status === 'nuevo' ? 'selected' : ''}>nuevo</option>
                    <option value="preparando" ${order.status === 'preparando' ? 'selected' : ''}>preparando</option>
                    <option value="enviado" ${order.status === 'enviado' ? 'selected' : ''}>enviado</option>
                    <option value="entregado" ${order.status === 'entregado' ? 'selected' : ''}>entregado</option>
                    <option value="cancelado" ${order.status === 'cancelado' ? 'selected' : ''}>cancelado</option>
                  </select>
                </div>
              </div>
            </article>
          `;
        }).join('');

        document.querySelectorAll('select[data-order-id]').forEach(select => {
          select.addEventListener('change', async (e) => {
            const orderId = Number(e.target.dataset.orderId);
            const newStatus = e.target.value;
            await updateStatus(orderId, newStatus);
          });
        });
      }

      async function loadOrders() {
        ordersContainer.innerHTML = '<div class="loading">Cargando pedidos...</div>';

        const { data: ordersData, error: ordersError } = await supabaseClient
          .from('orders')
          .select('*')
          .order('created_at', { ascending: false });

        const { data: itemsData, error: itemsError } = await supabaseClient
          .from('order_items')
          .select('*')
          .order('id', { ascending: true });

        if (ordersError || itemsError) {
          console.error(ordersError || itemsError);
          ordersContainer.innerHTML = '<div class="empty">No se pudieron cargar los pedidos.</div>';
          return;
        }

        const cut = await getDayCut();
        const allOrders = ordersData || [];
        const visibleOrders = allOrders.filter(order => new Date(order.created_at) >= cut);
        const visibleOrderIds = new Set(visibleOrders.map(order => order.id));
        const visibleItems = (itemsData || []).filter(item => visibleOrderIds.has(item.order_id));

        detectNewOrders(visibleOrders);
        await buildStats(visibleOrders);
        renderOrders(visibleOrders, visibleItems);

        updatedAtEl.textContent = `Última actualización: ${new Date().toLocaleTimeString('es-AR')}`;
        await updateDayCutInfo();
      }

      function startAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(loadOrders, 10000);
      }

      function stopAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
      }

      refreshBtn.addEventListener('click', loadOrders);

      logoutBtn.addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
        window.location.href = '/login';
      });

      toggleAutorefreshBtn.addEventListener('click', () => {
        autoRefreshEnabled = !autoRefreshEnabled;
        if (autoRefreshEnabled) {
          startAutoRefresh();
          toggleAutorefreshBtn.textContent = 'Auto refresh: ON';
        } else {
          stopAutoRefresh();
          toggleAutorefreshBtn.textContent = 'Auto refresh: OFF';
        }
      });

      resetDayBtn.addEventListener('click', async () => {
        const ok = confirm('¿Seguro que quieres reiniciar el día? Se ocultarán de la vista todos los pedidos recibidos hasta este momento.');
        if (!ok) return;
        const updated = await setDayCutNow();
        if (!updated) return;
        await loadOrders();
      });

      (async () => {
        const allowed = await requireAuth();
        if (!allowed) return;
        await ensureStoreSettings();
        await loadOrders();
        startAutoRefresh();
      })();
    </script>
  </body>
</html>
