<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Admin — Pedidos Comidas</title>
    <style>
      :root {
        --bg: #000;
        --panel: #09090b;
        --border: rgba(255,255,255,.1);
        --text: #fff;
        --muted: #a1a1aa;
        --accent: #f97316;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #000 0%, #09090b 55%, #431407 100%);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }
      .card {
        width: min(420px, calc(100% - 32px));
        background: rgba(24,24,27,.96);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 24px;
      }
      h1 { margin: 0 0 8px; font-size: 34px; }
      p { margin: 0 0 20px; color: var(--muted); }
      label { display:block; margin: 14px 0 8px; font-weight:700; }
      input {
        width: 100%;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,.04);
        color: #fff;
        padding: 14px 15px;
        font-size: 15px;
        outline: none;
      }
      button {
        width: 100%;
        margin-top: 18px;
        border: 0;
        border-radius: 16px;
        padding: 14px 16px;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent);
        color: #000;
      }
      .error {
        margin-top: 14px;
        color: #fca5a5;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Login admin</h1>
      <p>Acceso privado a pedidos y gestión.</p>

      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" type="email" required />

        <label for="password">Contraseña</label>
        <input id="password" type="password" required />

        <button type="submit" id="login-btn">Entrar</button>
        <div class="error" id="error-box"></div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = 'https://ylvmzavgebttklblidcd.supabase.co';
      const supabaseKey = 'sb_publishable_rFS54R3Uw06tOJ0qxoFhBA_uoEHW457';
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const errorBox = document.getElementById('error-box');

      // Si ya hay sesión, manda al admin
      supabaseClient.auth.getSession().then(({ data }) => {
        if (data.session) {
          window.location.href = '/admin.html';
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.textContent = '';
        btn.textContent = 'Entrando...';
        btn.disabled = true;

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const { error } = await supabaseClient.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          errorBox.textContent = 'Credenciales incorrectas o usuario inexistente.';
          btn.textContent = 'Entrar';
          btn.disabled = false;
          return;
        }

        window.location.href = '/admin.html';
      });
    </script>
  </body>
</html>
